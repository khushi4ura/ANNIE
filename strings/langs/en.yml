start_2 : "<blockquote><emoji id=\"5042192219960771668\">🧸</emoji><emoji id=\"5210820276748566172\">🔤</emoji><emoji id=\"5213301251722203632\">🔤</emoji><emoji id=\"5213301251722203632\">🔤</emoji><emoji id=\"5211032856154885824\">🔤</emoji><emoji id=\"5213337333742454261\">🔤</emoji></blockquote>\n\n<blockquote><emoji id=\"5463107823946717464\">🎵</emoji> <b>ʜᴇʟʟᴏ, {0}!</b> <emoji id=\"5463107823946717464\">🎵</emoji></blockquote>\n\n<blockquote><emoji id=\"5042334757040423886\">⚡️</emoji> ɪ'ᴍ <b>{1}</b>\nʏᴏᴜʀ ᴜʟᴛɪᴍᴀᴛᴇ ᴍᴜsɪᴄ sᴛʀᴇᴀᴍɪɴɢ ʙᴏᴛ ꜰᴏʀ ᴛᴇʟᴇɢʀᴀᴍ ɢʀᴏᴜᴘs</blockquote>\n\n<blockquote><b>🎵 ᴘʟᴀʏ</b> — ʏᴏᴜᴛᴜʙᴇ, sᴘᴏᴛɪꜰʏ, sᴏᴜɴᴅᴄʟᴏᴜᴅ, ᴀᴘᴘʟᴇ ᴍᴜsɪᴄ\n<b>📻 ʟɪᴠᴇ</b> — sᴛʀᴇᴀᴍ ʟɪᴠᴇ ʀᴀᴅɪᴏ &amp; ʏᴏᴜᴛᴜʙᴇ ʟɪᴠᴇ\n<b>🎬 ᴠɪᴅᴇᴏ</b> — ꜰᴜʟʟ ᴠɪᴅᴇᴏ ᴘʟᴀʏʙᴀᴄᴋ ɪɴ ᴠᴄ\n<b>🔀 ǫᴜᴇᴜᴇ</b> — ᴜɴʟɪᴍɪᴛᴇᴅ ᴛʀᴀᴄᴋ ǫᴜᴇᴜᴇ\n<b>🔁 ʟᴏᴏᴘ</b> — ʟᴏᴏᴘ &amp; ᴀᴜᴛᴏᴘʟᴀʏ ᴍᴏᴅᴇs\n<b>⚡️ ꜰᴀsᴛ</b> — ᴢᴇʀᴏ ʟᴀɢ, ʜᴅ ᴀᴜᴅɪᴏ, 24/7 ᴜᴘᴛɪᴍᴇ</blockquote>\n\n<blockquote><emoji id=\"5449449325434266744\">❄️</emoji> ᴀᴅᴅ ᴍᴇ ᴛᴏ ʏᴏᴜʀ ɢʀᴏᴜᴘ ᴀɴᴅ ᴜsᴇ <code>/play</code> ᴛᴏ ʙᴇɢɪɴ!</blockquote>"
